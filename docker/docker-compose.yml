services:
  app:
    build:
      context: ..
      dockerfile: docker/dockerfile/Dockerfile.app
    ports:
      - "8000:8000"
    environment:
      - MODEL_NAME=sergeyzh/rubert-mini-frida
      - INFERENCE_BACKEND=onnx
      - ONNX_MODEL_PATH=/models/onnx
      - DYNAMIC_BATCHING=true
      - BATCH_MAX_SIZE=32
      - BATCH_MAX_WAIT_MS=1
    volumes:
      - model_cache:/root/.cache/huggingface
      - ../app:/app
      - ../models/onnx:/models/onnx
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  bench:
    build:
      context: ..
      dockerfile: docker/dockerfile/Dockerfile.bench
    ports:
      - "8089:8089"
    environment:
      - EMBED_ENDPOINT=/embed
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../bench:/bench
    depends_on:
      app:
        condition: service_healthy

volumes:
  model_cache:
